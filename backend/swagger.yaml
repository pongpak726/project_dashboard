openapi: 3.0.0
info:
  title: Dashboard API
  version: 1.0.0
  description: API for Dashboard + VMS system

servers:
  - url: http://localhost:5000/api

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management endpoints
  - name: Dashboard
    description: Dashboard data endpoints
  - name: VMS
    description: VMS (Variable Message Sign) endpoints
  - name: Device
    description: Device management endpoints

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          example: cm1234567890abcdef
        username:
          type: string
          example: admin
        name:
          type: string
          example: John Doe
        role:
          type: string
          enum: [ADMIN, SUPER_ADMIN, USER]
          example: ADMIN
        isActive:
          type: boolean
          example: true
        createdAt:
          type: string
          format: date-time

    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          example: admin
        password:
          type: string
          example: password123

    RegisterRequest:
      type: object
      required:
        - username
        - password
        - name
      properties:
        username:
          type: string
          example: newuser
        password:
          type: string
          example: password123
        name:
          type: string
          example: New User

    CreateUserRequest:
      type: object
      required:
        - username
        - password
        - name
        - role
      properties:
        username:
          type: string
        password:
          type: string
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, SUPER_ADMIN, USER]

    UpdateUserRequest:
      type: object
      properties:
        name:
          type: string
        role:
          type: string
          enum: [ADMIN, SUPER_ADMIN, USER]
        isActive:
          type: boolean

    VMS:
      type: object
      properties:
        id:
          type: string
          example: bangkok_01:vms-001
        siteName:
          type: string
        lat:
          type: number
          nullable: true
        lon:
          type: number
          nullable: true
        currentImage:
          type: string
        updatedAt:
          type: string
          format: date-time

    VMSLocationUpdate:
      type: object
      required:
        - lat
        - lon
      properties:
        lat:
          type: number
          example: 13.75
        lon:
          type: number
          example: 100.50

    Weather:
      type: object
      properties:
        deviceId:
          type: string
        temperature:
          type: number
        humidity:
          type: number
        pm25:
          type: number
        timestamp:
          type: string
          format: date-time

    Restroom:
      type: object
      properties:
        deviceId:
          type: string
        status:
          type: string
        available:
          type: integer
        total:
          type: integer

    Parking:
      type: object
      properties:
        deviceId:
          type: string
        available:
          type: integer
        total:
          type: integer

    Overview:
      type: object
      properties:
        totalDevices:
          type: integer
        activeDevices:
          type: integer
        weatherDevices:
          type: integer
        parkingDevices:
          type: integer

    Device:
      type: object
      properties:
        id:
          type: string
        name:
          type: string
        type:
          type: string
        status:
          type: string

    LoginLog:
      type: object
      properties:
        id:
          type: string
        username:
          type: string
        ip:
          type: string
        userAgent:
          type: string
        createdAt:
          type: string
          format: date-time

    TokenResponse:
      type: object
      properties:
        accessToken:
          type: string
        refreshToken:
          type: string
        user:
          type: object
          properties:
            id:
              type: string
            username:
              type: string
            role:
              type: string

    Error:
      type: object
      properties:
        message:
          type: string
          example: Error message

    Error400:
      type: object
      properties:
        message:
          type: string
          example: Bad request
    Error401:
      type: object
      properties:
        message:
          type: string
          example: Unauthorized
    Error403:
      type: object
      properties:
        message:
          type: string
          example: Forbidden
    Error404:
      type: object
      properties:
        message:
          type: string
          example: User not found
    Error500:
      type: object
      properties:
        message:
          type: string
          example: Internal server error

    # Prisma Errors
    PrismaErrorP2002:
      type: object
      properties:
        message:
          type: string
          example: Duplicate field value
    PrismaErrorP2025:
      type: object
      properties:
        message:
          type: string
          example: Record not found

paths:

  # ================= AUTH =================
  /auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        201:
          description: User created successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/login:
    post:
      tags: [Auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        200:
          description: Login successful
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        401:
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  /auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh token
      security:
        - bearerAuth: []
      responses:
        200:
          description: Token refreshed successfully
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/TokenResponse'
        401:
          description: Invalid or expired token
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error'

  # ================= USERS =================
  /users:
    get:
      tags: [Users]
      summary: Get all users
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: page
          schema:
            type: integer
            default: 1
        - in: query
          name: limit
          schema:
            type: integer
            default: 10
      responses:
        200:
          description: List of users
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
        403:
          description: Forbidden

    post:
      tags: [Users]
      summary: Create new user
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateUserRequest'
      responses:
        201:
          description: User created
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden

  /users/{id}:
    get:
      tags: [Users]
      summary: Get user by ID
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: User not found

    patch:
      tags: [Users]
      summary: Update user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateUserRequest'
      responses:
        200:
          description: User updated
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        400:
          description: Bad request
        401:
          description: Unauthorized
        403:
          description: Forbidden
        404:
          description: User not found

    delete:
      tags: [Users]
      summary: Delete user
      security:
        - bearerAuth: []
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
      responses:
        200:
          description: User deleted
        401:
          description: Unauthorized
        403:
          description: Forbidden (Super Admin only)
        404:
          description: User not found

  # ================= DASHBOARD =================
  /dashboard/weather:
    get:
      tags: [Dashboard]
      summary: Get weather data
      parameters:
        - in: query
          name: site
          schema:
            type: string
          description: Filter by site name
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
          description: Number of records per device
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
          description: Filter records from this date
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
          description: Filter records until this date
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Weather'

  /dashboard/restroom:
    get:
      tags: [Dashboard]
      summary: Get restroom data
      parameters:
        - in: query
          name: site
          schema:
            type: string
          description: Filter by site name
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Restroom'

  /dashboard/parking:
    get:
      tags: [Dashboard]
      summary: Get parking data
      parameters:
        - in: query
          name: site
          schema:
            type: string
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
        - in: query
          name: startDate
          schema:
            type: string
            format: date-time
        - in: query
          name: endDate
          schema:
            type: string
            format: date-time
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/Parking'

  /dashboard/overview:
    get:
      tags: [Dashboard]
      summary: Get overview
      parameters:
        - in: query
          name: site
          schema:
            type: string
          description: Filter by site name (can be repeated)
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        site:
                          type: string
                        devices:
                          type: array
                          items:
                            type: object
                        weather:
                          type: array
                        restroom:
                          type: array
                        parking:
                          type: array

  # ================= DEVICE =================
  /dashboard/devices:
    get:
      tags: [Device]
      summary: Get all devices
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        siteName:
                          type: string
                        lat:
                          type: number
                          nullable: true
                        lon:
                          type: number
                          nullable: true

  # ================= VMS =================
  /vms/ingest:
    post:
      tags: [VMS]
      summary: Upload VMS image
      requestBody:
        required: true
        content:
          multipart/form-data:
            schema:
              type: object
              required:
                - id
                - image
              properties:
                id:
                  type: string
                  example: bangkok_01:vms-001
                  description: VMS ID in format site:device
                image:
                  type: string
                  format: binary
                  description: Image file
      responses:
        200:
          description: Uploaded successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
        400:
          description: Missing id or image
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'

  /vms/latesvms:
    get:
      tags: [VMS]
      summary: Get latest VMS
      parameters:
        - in: query
          name: site
          schema:
            type: string
          description: Filter by site name
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/VMS'

  /vms/logs:
    get:
      tags: [VMS]
      summary: Get VMS logs
      parameters:
        - in: query
          name: id
          required: true
          schema:
            type: string
          description: VMS ID
        - in: query
          name: limit
          schema:
            type: integer
            default: 50
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  count:
                    type: integer
                  data:
                    type: array
                    items:
                      type: object
                      properties:
                        vmsId:
                          type: string
                        imageUrl:
                          type: string
                        timestamp:
                          type: string
                          format: date-time
        400:
          description: Missing id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'

  /vms/{id}/location:
    patch:
      tags: [VMS]
      summary: Update VMS location
      parameters:
        - in: path
          name: id
          required: true
          schema:
            type: string
          description: VMS ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VMSLocationUpdate'
      responses:
        200:
          description: updated
          content:
            application/json:
              schema:
                type: object
                properties:
                  success:
                    type: boolean
                  data:
                    $ref: '#/components/schemas/VMS'
        400:
          description: Missing id
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error400'
        404:
          description: VMS not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Error404'

  # ================= ADMIN =================
  /admin/login-logs:
    get:
      tags: [Admin]
      summary: Get login logs
      security:
        - bearerAuth: []
      parameters:
        - in: query
          name: limit
          schema:
            type: integer
            default: 20
      responses:
        200:
          description: success
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: '#/components/schemas/LoginLog'