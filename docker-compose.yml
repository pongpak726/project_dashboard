version: "3.8"

services:
  db:
    image: mysql:8.1
    container_name: dashboard-db
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: dashboard_db
      MYSQL_USER: Admin
      MYSQL_PASSWORD: Admin1234
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql

volumes:
  db_data: